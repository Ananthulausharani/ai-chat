<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        #chat {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .user-message strong {
            color: #667eea;
        }
        
        .ai-message strong {
            color: #764ba2;
        }
        
        .message-content {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .user-message .message-content {
            background: #667eea;
            color: white;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #message {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #message:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #764ba2;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Chat Assistant</h1>
            <p>Powered by Groq AI</p>
        </div>
        
        <div id="index"></div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="message" 
                placeholder="Ask me anything..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById('message');
            const message = messageInput.value.trim();
            const chatDiv = document.getElementById('index');
            const sendBtn = document.getElementById('sendBtn');
            
            if (!message) return;
            
            // Display user message
            chatDiv.innerHTML += `
                <div class="message user-message">
                    <strong>You</strong>
                    <div class="message-content">${escapeHtml(message)}</div>
                </div>
            `;
            
            // Clear input and disable button
            messageInput.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> Thinking...';
            
            // Scroll to bottom
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const response = await fetch(
                    `https://ananthulausharani1.app.n8n.cloud/webhook/794dedf7-a7bf-4100-bc58-34bf389db9eb?message=${encodeURIComponent(message)}`
                );
                
                const aiResponse = await response.text();
                
                // Display AI response
                chatDiv.innerHTML += `
                    <div class="message ai-message">
                        <strong>AI Assistant</strong>
                        <div class="message-content">${escapeHtml(aiResponse)}</div>
                    </div>
                `;
            } catch (error) {
                chatDiv.innerHTML += `
                    <div class="message ai-message">
                        <strong>Error</strong>
                        <div class="message-content">Sorry, something went wrong. Please try again.</div>
                    </div>
                `;
            }
            
            // Re-enable button
            sendBtn.disabled = false;
            sendBtn.innerHTML = 'Send';
            
            // Scroll to bottom
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
